name: C/C++ CI

on:
  push:
    tags:
      - '*'

jobs:
  build_max_macARM:

    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install submodules
      run: git submodule update --init --recursive
    - name: Install Eigen
      run: |
        brew upgrade eigen || brew install eigen
    - name: Install hdf5
      run: |
        brew install hdf5
    - name: Install json
      run: |
        brew install nlohmann-json
    - name: Build external
      run: |
        cd src/tarte-tilde
        mkdir -p ./build
        cd ./build
        cmake -DCMAKE_BUILD_TYPE=Release .. -DCMAKE_OSX_ARCHITECTURES:STRING=arm64 
        cmake --build . --config "Release" --verbose
        cd ..
        zip -r "tarte-tilde.zip" package
    - name: Create release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
        tag_name: Max-MacARM-${{ github.ref_name }}
        release_name: Max-MacARM-${{ github.ref_name }}
        draft: true
        prerelease: false
    - name: Upload release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: src/tarte-tilde/tarte-tilde.zip
        asset_name: tarte-tilde.zip
        asset_content_type: application/zip
    - name: Publish release
      uses: StuYarrow/publish-release@v1.1.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        id: ${{ steps.create_release.outputs.id }}

  build_max_macINTEL:

    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install submodules
      run: git submodule update --init --recursive
    - name: Install Eigen
      run: |
        brew upgrade eigen || brew install eigen
    - name: Install hdf5
      run: |
        brew install hdf5
    - name: Install json
      run: |
        brew install nlohmann-json
    - name: Build external
      run: |
        cd src/tarte-tilde
        mkdir -p ./build
        cd ./build
        cmake -DCMAKE_BUILD_TYPE=Release .. -DCMAKE_OSX_ARCHITECTURES:STRING=x86_64
        cmake --build . --config "Release"
        cd ..
        zip -r "tarte-tilde.zip" package
    - name: Create release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
        tag_name: Max-MacINTEL-${{ github.ref_name }}
        release_name: Max-MacINTEL-${{ github.ref_name }}
        draft: true
        prerelease: false
    - name: Upload release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: src/tarte-tilde/tarte-tilde.zip
        asset_name: tarte-tilde.zip
        asset_content_type: application/zip
    - name: Publish release
      uses: StuYarrow/publish-release@v1.1.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        id: ${{ steps.create_release.outputs.id }}

  build_max_windows:

    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install submodules
      run: git submodule update --init --recursive
    - name: Update vcpkg
      shell: pwsh
      run: |
        cd C:\vcpkg
        git pull
        .\bootstrap-vcpkg.bat -disableMetrics
    - name: Install dependencies via vcpkg
      shell: pwsh
      run: |
        vcpkg install eigen3:x64-windows hdf5:x64-windows nlohmann-json:x64-windows
    - name: Build external
      shell: pwsh
      env:
        HDF5_ROOT: C:\vcpkg\installed\x64-windows
      run: |
        cd src/tarte-tilde
        New-Item -ItemType Directory -Force -Path ./build
        cd ./build
        cmake -DCMAKE_BUILD_TYPE=Release .. -A x64 `
          -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows `
          -DHDF5_ROOT="C:/vcpkg/installed/x64-windows"
        cmake --build . --config Release --verbose
        cd ..
        Compress-Archive -Path package -DestinationPath tarte-tilde.zip
    - name: Create release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: Max-Windows-${{ github.ref_name }}
        release_name: Max-Windows-${{ github.ref_name }}
        draft: true
        prerelease: false
    - name: Upload release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: src/tarte-tilde/tarte-tilde.zip
        asset_name: tarte-tilde.zip
        asset_content_type: application/zip
    - name: Publish release
      uses: StuYarrow/publish-release@v1.1.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        id: ${{ steps.create_release.outputs.id }}
        
      